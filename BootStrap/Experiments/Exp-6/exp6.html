<!DOCTYPE html>
<html>
<head>
    <title>Experiment-6</title>

    <link rel="stylesheet" href="exp6.css">
</head>

<body>

    <div class="box">

        <h1 id="heading">
            Welcome to JavaScript Lab
        </h1>

        <input type="text"
        id="inputText"
        placeholder="Enter heading text">

        <br><br>

        <button id="textBtn">
            Change Heading
        </button>

        <button id="bgBtn">
            Change Background
        </button>

        <button id="fontBtn">
            Increase Font
        </button>

        <button id="toggleBtn">
            Show / Hide
        </button>

        <button id="resetBtn">
            Reset
        </button>

        <p id="para">
            JavaScript can change webpage content dynamically.
        </p>

    </div>

    <script src="exp6.js"></script>

</body>
</html>
