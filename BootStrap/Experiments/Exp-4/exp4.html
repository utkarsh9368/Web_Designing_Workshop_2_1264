<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment 4</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url('ABES.jpeg') no-repeat center;
    background-size: cover;
}

.card {
    background-color: #ffffff; /* no transparency */
}
</style>
</head>

<body class="d-flex align-items-end justify-content-center vh-100">

<div class="container mb-4">
<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-sm">
<div class="card-body">

<h3 class="text-center mb-3">Student Result Calculator</h3>

<p class="text-center text-muted">
Enter number of subjects
</p>

<div class="mb-3">
<label class="form-label">Number of Subjects</label>
<input 
type="number" 
id="numSubjects" 
class="form-control" 
placeholder="1 to 12"
min="1"
max="12">
</div>

<div class="d-grid">
<button class="btn btn-dark" onclick="calculateResult()">
Calculate Result
</button>
</div>

<div id="resultBox" class="mt-4 p-3 border rounded d-none"></div>

</div>
</div>

</div>
</div>
</div>

<script src="exp4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
